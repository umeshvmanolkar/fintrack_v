<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack - Login</title>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">

    <!-- Authentication Screen -->
    <div id="auth-container" style="width: 100%; max-width: 400px;">
        <div class="card auth-card" style="padding: 2.5rem;">
            <div class="text-center mb-6">
                <div class="logo-box mx-auto flex items-center justify-center mb-4"
                    style="margin: 0 auto; margin-bottom: 1rem;">
                    <i data-lucide="layers" style="color: white; width: 24px;"></i>
                </div>
                <h2 id="auth-title">Welcome Back</h2>
                <p class="text-muted mt-2" id="auth-subtitle">Log in to your FinTrack dashboard.</p>
            </div>

            <form id="auth-form" onsubmit="app.submitAuth(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="form-group mb-6">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;" id="auth-btn-text">Sign In</button>
            </form>

            <div class="text-center mt-6 text-muted" style="font-size: 0.85rem;">
                <span id="auth-switch-text">Don't have an account?</span>
                <span class="auth-switch-link text-primary" onclick="app.toggleAuthMode()"
                    style="cursor: pointer; font-weight: 600;">Sign up</span>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>

</html>
